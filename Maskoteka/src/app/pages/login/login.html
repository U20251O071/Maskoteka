<div class="container-fluid auth-page d-flex align-items-center justify-content-center p-4">
  <div class="auth-card row g-0 w-100" style="max-width:1050px">
    <div class="col-lg-6 auth-form">
      <div class="d-flex align-items-center gap-2 mb-5"><span class="brand-mark">M</span><span class="brand">Maskoteka</span></div>
      <span class="small-link">🐾 Bienvenido de nuevo</span>
      <h1 class="fw-bold mt-2">Inicia sesión en Maskoteka</h1>
      <p class="muted mb-4">Ingresa tu correo y contraseña para continuar.</p>
      <form (ngSubmit)="ingresar()" novalidate>
        <div class="mb-3"><label class="label">Correo electrónico</label><input class="form-control" type="email" placeholder="ejemplo@correo.com" name="email" [(ngModel)]="email"><div class="invalid-msg" *ngIf="submitted && !email">Ingresa tu correo electrónico.</div></div>
        <div class="mb-2"><label class="label">Contraseña</label><div class="input-icon"><input class="form-control" type="password" placeholder="Ingresa tu contraseña" name="password" [(ngModel)]="password"><span>◉</span></div><div class="invalid-msg" *ngIf="submitted && !password">Ingresa tu contraseña.</div></div>
        <div class="d-flex justify-content-end mb-4"><a class="small-link" href="#">¿Olvidaste tu contraseña?</a></div>
        <button class="btn btn-primary w-100" type="submit">↪ Iniciar sesión</button>
      </form>
      <hr class="my-4"><p class="text-center muted">¿No tienes una cuenta? <a routerLink="/registro" class="small-link">Regístrate</a></p>
    </div>
    <div class="col-lg-6 auth-visual"><div><span class="brand-mark fs-3">M</span><h2 class="fw-bold mt-3">Maskoteka</h2><p>Cuidado y bienestar<br>para tu mejor amigo</p><div class="pet-hero">🐶🐱</div></div></div>
  </div>
</div>
